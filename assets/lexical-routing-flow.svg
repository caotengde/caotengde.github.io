<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Simplified flowchart for the COGS intervention sweep</title>
  <desc id="desc">A flowchart summarizing the paper: pre-committed COGS attempts lead to diagnosis, probing, decoder interventions, structural wall tests, decomposition, and remaining structural decoder candidates.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0a4f49"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#172026" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg{fill:#fbfaf6}
      .box{fill:#fff;stroke:#d9dee2;stroke-width:2;rx:8;filter:url(#shadow)}
      .box-accent{fill:#edf4f1;stroke:#0f766e;stroke-width:2;rx:8;filter:url(#shadow)}
      .box-warm{fill:#fff8eb;stroke:#b9851b;stroke-width:2;rx:8;filter:url(#shadow)}
      .title{font:700 22px Inter,Arial,sans-serif;fill:#172026}
      .label{font:500 16px Inter,Arial,sans-serif;fill:#5d6872}
      .small{font:700 13px Inter,Arial,sans-serif;fill:#b94b43}
      .arrow{stroke:#0a4f49;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .split{stroke:#0a4f49;stroke-width:3;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1280" height="520"/>

  <rect class="box-accent" x="50" y="78" width="200" height="116"/>
  <text x="74" y="112" class="small">PROTOCOL</text>
  <text x="74" y="143" class="title">Pre-committed</text>
  <text x="74" y="169" class="label">23 COGS attempts</text>

  <path class="arrow" d="M250 136 H315"/>

  <rect class="box" x="315" y="78" width="210" height="116"/>
  <text x="339" y="112" class="small">DIAGNOSIS</text>
  <text x="339" y="143" class="title">Aggregate Gen</text>
  <text x="339" y="169" class="label">hides multiple failures</text>

  <path class="arrow" d="M525 136 H590"/>

  <rect class="box" x="590" y="78" width="220" height="116"/>
  <text x="614" y="112" class="small">PROBE PIVOT</text>
  <text x="614" y="143" class="title">Encoder has identity</text>
  <text x="614" y="169" class="label">decoder fails to route it</text>

  <path class="arrow" d="M810 136 H875"/>

  <rect class="box-warm" x="875" y="78" width="230" height="116"/>
  <text x="899" y="112" class="small">DECODER FIXES</text>
  <text x="899" y="143" class="title">Copy + ALiBi</text>
  <text x="899" y="169" class="label">lexical routing improves</text>

  <path class="split" d="M990 194 V248"/>
  <path class="arrow" d="M990 248 H1010"/>

  <rect class="box" x="1010" y="216" width="220" height="116"/>
  <text x="1034" y="250" class="small">WALL TESTS</text>
  <text x="1034" y="281" class="title">Data, scale, depth</text>
  <text x="1034" y="307" class="label">registered controls</text>

  <path class="split" d="M1120 332 V378"/>
  <path class="split" d="M210 378 H1120"/>
  <path class="arrow" d="M210 378 V410"/>
  <path class="arrow" d="M640 378 V410"/>
  <path class="arrow" d="M1070 378 V410"/>

  <rect class="box-accent" x="70" y="410" width="280" height="82"/>
  <text x="94" y="440" class="title">Cross-position PP</text>
  <text x="94" y="466" class="label">distributional; fixed by synthesis</text>

  <rect class="box-accent" x="500" y="410" width="280" height="82"/>
  <text x="524" y="440" class="title">Shallow recursion</text>
  <text x="524" y="466" class="label">coverage plus capacity sensitive</text>

  <rect class="box-warm" x="930" y="410" width="280" height="82"/>
  <text x="954" y="440" class="title">Deep recursion residue</text>
  <text x="954" y="466" class="label">needs structural decoder operations</text>
</svg>
