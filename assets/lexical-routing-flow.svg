<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Flowchart for the COGS intervention sweep</title>
  <desc id="desc">A polished flowchart showing the research protocol, diagnostic pivot, interventions, structural tests, and three-part decomposition.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0a4f49"/>
    </marker>
    <filter id="cardShadow" x="-10%" y="-18%" width="120%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#172026" flood-opacity="0.11"/>
    </filter>
    <style>
      .page{fill:#fbfaf6}
      .band{fill:#edf4f1}
      .card{fill:#ffffff;stroke:#d9dee2;stroke-width:2;filter:url(#cardShadow)}
      .card-teal{fill:#f6fbf9;stroke:#0f766e;stroke-width:2;filter:url(#cardShadow)}
      .card-gold{fill:#fff8eb;stroke:#b9851b;stroke-width:2;filter:url(#cardShadow)}
      .kicker{font:700 13px Inter,Arial,sans-serif;fill:#b94b43;letter-spacing:.5px}
      .head{font:800 24px Inter,Arial,sans-serif;fill:#172026}
      .sub{font:500 16px Inter,Arial,sans-serif;fill:#5d6872}
      .section{font:800 30px Inter,Arial,sans-serif;fill:#172026}
      .rule{stroke:#d9dee2;stroke-width:2}
      .arrow{stroke:#0a4f49;stroke-width:3.5;fill:none;marker-end:url(#arrow)}
      .hub{fill:#0f766e}
    </style>
  </defs>

  <rect class="page" width="1280" height="720"/>
  <rect class="band" x="0" y="0" width="1280" height="118"/>
  <text x="64" y="54" class="kicker">SIMPLIFIED RESEARCH FLOW</text>
  <text x="64" y="91" class="section">From aggregate COGS scores to a decomposed failure map</text>

  <rect class="card-teal" x="64" y="158" width="232" height="128" rx="8"/>
  <text x="90" y="195" class="kicker">01 PROTOCOL</text>
  <text x="90" y="229" class="head">Pre-commit</text>
  <text x="90" y="255" class="sub">23 attempts</text>

  <path class="arrow" d="M296 222 H355"/>

  <rect class="card" x="355" y="158" width="232" height="128" rx="8"/>
  <text x="381" y="195" class="kicker">02 PROBLEM</text>
  <text x="381" y="229" class="head">One score</text>
  <text x="381" y="255" class="sub">many failure modes</text>

  <path class="arrow" d="M587 222 H646"/>

  <rect class="card" x="646" y="158" width="232" height="128" rx="8"/>
  <text x="672" y="195" class="kicker">03 PIVOT</text>
  <text x="672" y="229" class="head">Probe encoder</text>
  <text x="672" y="255" class="sub">identity is present</text>

  <path class="arrow" d="M878 222 H937"/>

  <rect class="card-gold" x="937" y="158" width="280" height="128" rx="8"/>
  <text x="963" y="195" class="kicker">04 INTERVENTION</text>
  <text x="963" y="229" class="head">Decoder routing</text>
  <text x="963" y="255" class="sub">copy head and ALiBi</text>

  <path class="arrow" d="M1077 286 V352"/>

  <rect class="card" x="474" y="352" width="332" height="120" rx="8"/>
  <text x="504" y="389" class="kicker">05 REGISTERED CONTROLS</text>
  <text x="504" y="423" class="head">Test the wall</text>
  <text x="504" y="449" class="sub">data, scale, depth visibility</text>

  <path class="arrow" d="M937 412 H806"/>

  <circle class="hub" cx="640" cy="532" r="7"/>
  <path class="rule" d="M640 472 V532"/>
  <path class="rule" d="M200 532 H1080"/>
  <path class="arrow" d="M200 532 V584"/>
  <path class="arrow" d="M640 532 V584"/>
  <path class="arrow" d="M1080 532 V584"/>

  <rect class="card-teal" x="64" y="584" width="272" height="96" rx="8"/>
  <text x="88" y="619" class="head">Distribution</text>
  <text x="88" y="645" class="sub">Cross-position PP</text>
  <text x="88" y="668" class="sub">fixed by synthesis</text>

  <rect class="card-teal" x="504" y="584" width="272" height="96" rx="8"/>
  <text x="528" y="619" class="head">Capacity</text>
  <text x="528" y="645" class="sub">Shallow recursion</text>
  <text x="528" y="668" class="sub">improves with scale</text>

  <rect class="card-gold" x="944" y="584" width="272" height="96" rx="8"/>
  <text x="968" y="619" class="head">Residue</text>
  <text x="968" y="645" class="sub">Deep recursion</text>
  <text x="968" y="668" class="sub">needs structure</text>
</svg>
